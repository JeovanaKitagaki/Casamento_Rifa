<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grande Sorteio da Rifa - Jeovana & Luiz Vitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-oliva-escuro: #4a5335;
            --verde-oliva-medio: #606c38;
            --verde-oliva-claro: #e6ebd9;
            --verde-oliva-borda: #a3b18a;
            --creme-fundo: #faf7f2;
            --creme-card: #ffffff;
            --azul-antigo: #5c7a89;
            --rosa-antigo: #c59797;
            --texto-escuro: #2c3022;
            --texto-claro: #707563;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--creme-fundo);
            color: var(--texto-escuro);
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            background-image: radial-gradient(var(--verde-oliva-claro) 0.5px, transparent 0.5px), radial-gradient(var(--verde-oliva-claro) 0.5px, var(--creme-fundo) 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--creme-card);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 83, 53, 0.08);
            border: 1px solid rgba(163, 177, 138, 0.3);
        }

        .monograma {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-style: italic;
            color: var(--verde-oliva-escuro);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .divisor-folhas {
            color: var(--verde-oliva-borda);
            font-size: 16px;
            margin-bottom: 25px;
        }

        h1 { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 38px;
            color: var(--verde-oliva-escuro); 
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        .info-vendas {
            font-size: 14px;
            color: var(--texto-claro);
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display-sorteio {
            width: 200px;
            height: 200px;
            background-color: var(--verde-oliva-claro);
            border: 3px solid var(--verde-oliva-escuro);
            color: var(--verde-oliva-escuro);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(74, 83, 53, 0.15);
            transition: all 0.1s ease;
        }

        .display-sorteio.girando {
            animation: pulsar 0.2s infinite alternate;
            background-color: var(--verde-oliva-escuro);
            color: white;
        }

        @keyframes pulsar {
            from { transform: scale(0.96); }
            to { transform: scale(1.04); }
        }

        #painel-ganhador {
            display: none;
            margin-top: 30px;
            padding: 25px 20px;
            background-color: #fafaf8;
            border-left: 5px solid var(--verde-oliva-medio);
            border-radius: 4px 12px 12px 4px;
            animation: surgirGanhador 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes surgirGanhador {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nome-ganhador {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--verde-oliva-escuro);
            margin: 10px 0 5px 0;
            font-weight: bold;
        }

        .btn-sortear {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--verde-oliva-escuro);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(74, 83, 53, 0.2);
            transition: all 0.2s;
        }

        .btn-sortear:hover {
            background-color: var(--verde-oliva-medio);
            transform: translateY(-2px);
        }

        .btn-sortear:disabled {
            background-color: #b5b5b5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status-msg {
            color: var(--azul-antigo);
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="monograma">J & L</div>
    <div class="divisor-folhas">🍃 ———————— 🍃</div>
    
    <h1>Grande Sorteio da Rifa</h1>
    <div class="info-vendas" id="txtContador">Carregando participantes...</div>
    
    <div class="display-sorteio" id="idDisplay">--</div>

    <div id="painel-ganhador">
        <div style="font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-claro); font-weight: 600;">🎉 O felizardo(a) é:</div>
        <div class="nome-ganhador" id="idNomeGanhador">Nome do Convidado</div>
    </div>

    <button class="btn-sortear" id="btnAcao" onclick="iniciarSorteio()" disabled>Realizar Sorteio</button>
    <div id="status-msg">Conectando ao banco de dados...</div>
</div>

<script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPmVS6dppOmMDGPxxf0hI52Pf-r26HJb2uIps6zP52PCvW4GMedNPWmHrn5G_NHuIP7Q/exec";
    
    let listaParticipantes = [];
    let audioCtx = null;

    async function puxarDadosSorteio() {
        try {
            const response = await fetch(`${APP_SCRIPT_URL}?tipo=sorteio`);
            const data = await response.json();
            
            listaParticipantes = data.participantes || [];
            
            document.getElementById('status-msg').style.display = 'none';
            const btn = document.getElementById('btnAcao');
            
            if (listaParticipantes.length === 0) {
                document.getElementById('txtContador').innerText = "Nenhum número vendido ainda.";
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('status-msg').innerText = "Aba de vendas vazia.";
            } else {
                document.getElementById('txtContador').innerText = `${listaParticipantes.length} números concorrendo na urna!`;
                btn.disabled = false;
            }
        } catch (error) {
            document.getElementById('status-msg').innerText = 'Erro ao conectar. Recarregue a página.';
            console.error(error);
        }
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function tocarBatidaSuspense(frequencia, duracao) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(frequencia, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duracao);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + duracao);
    }

    function tocarSomVitoria() {
        if (!audioCtx) return;
        const notas = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99]; 
        
        notas.forEach((freq, i) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.08));
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime + (i * 0.08));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.08) + 0.6);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(audioCtx.currentTime + (i * 0.08));
            osc.stop(audioCtx.currentTime + (i * 0.08) + 0.6);
        });
    }

    function iniciarSorteio() {
        initAudio();

        const display = document.getElementById('idDisplay');
        const btn = document.getElementById('btnAcao');
        const painel = document.getElementById('painel-ganhador');
        
        btn.disabled = true;
        painel.style.display = 'none'; 
        display.classList.add('girando');
        
        let tempoTotal = 10000; // Alterado para 10 segundos de duração total
        let tempoDecorrido = 0;
        let freqSuspense = 60; 
        
        // Loop recursivo inteligente usando setTimeout para simular desaceleração
        function rodarPasso() {
            // Calcula a porcentagem do progresso (0 a 1)
            let progresso = tempoDecorrido / tempoTotal;
            
            // A velocidade inicial começa em 50ms e vai aumentando até 400ms nas batidas finais
            let velocidadeAtual = 50 + (progresso * progresso * 350); 
            let duracaoSom = (velocidadeAtual / 1000) * 0.9;
            
            // Toca o som ritmado
            tocarBatidaSuspense(freqSuspense, duracaoSom);
            freqSuspense += 0.8; // Sobe o tom de agonia sutilmente
            
            // Muda o número na tela
            const participanteAleatorio = listaParticipantes[Math.floor(Math.random() * listaParticipantes.length)];
            display.innerText = participanteAleatorio.numero;
            
            tempoDecorrido += velocidadeAtual;
            
            if (tempoDecorrido < tempoTotal) {
                // Continua girando com a nova velocidade calculada
                setTimeout(rodarPasso, velocidadeAtual);
            } else {
                // Chegou nos 10 segundos: Para e coroa o vencedor!
                tocarSomVitoria();
                revelarGanhadorReal();
            }
        }
        
        // Dá o start inicial no cronômetro
        rodarPasso();
    }

    function revelarGanhadorReal() {
        const display = document.getElementById('idDisplay');
        const btn = document.getElementById('btnAcao');
        const painel = document.getElementById('painel-ganhador');
        
        display.classList.remove('girando');
        
        const indexSorteado = Math.floor(Math.random() * listaParticipantes.length);
        const ganhador = listaParticipantes[indexSorteado];
        
        display.innerText = ganhador.numero;
        document.getElementById('idNomeGanhador').innerText = ganhador.nome;
        
        painel.style.display = 'block';
        btn.disabled = false;
        btn.innerText = "Sortear Novamente";
    }

    puxarDadosSorteio();
</script>

</body>
</html>
