<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ação entre Amigos - Jeovana & Luiz Vitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-oliva-escuro: #4a5335;
            --verde-oliva-medio: #606c38;
            --verde-oliva-claro: #e6ebd9;
            --verde-oliva-borda: #a3b18a;
            --creme-fundo: #faf7f2;
            --creme-card: #ffffff;
            --azul-antigo: #5c7a89;
            --rosa-antigo: #c59797;
            --texto-escuro: #2c3022;
            --texto-claro: #707563;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--creme-fundo);
            color: var(--texto-escuro);
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(var(--verde-oliva-claro) 0.5px, transparent 0.5px), radial-gradient(var(--verde-oliva-claro) 0.5px, var(--creme-fundo) 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--creme-card);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 83, 53, 0.08);
            border: 1px solid rgba(163, 177, 138, 0.3);
        }

        .monograma {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-style: italic;
            color: var(--verde-oliva-escuro);
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 5px;
        }

        .divisor-folhas {
            color: var(--verde-oliva-borda);
            font-size: 16px;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            text-align: center;
            color: var(--verde-oliva-escuro);
            margin: 0 0 15px 0;
            font-weight: 600;
        }

        .descricao {
            text-align: center;
            font-size: 15px;
            line-height: 1.6;
            color: var(--texto-claro);
            margin-bottom: 30px;
        }

        .grid-numeros {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }

        @media (max-width: 400px) {
            .grid-numeros { grid-template-columns: repeat(4, 1fr); }
        }

        .numero-botao {
            font-family: 'Montserrat', sans-serif;
            aspect-ratio: 1 / 1;
            border: 1px solid var(--verde-oliva-borda);
            background-color: var(--creme-fundo);
            color: var(--verde-oliva-escuro);
            font-size: 16px;
            font-weight: 600;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .numero-botao:hover:not(:disabled) {
            background-color: var(--verde-oliva-claro);
            transform: scale(1.05);
        }

        .numero-botao.selecionado {
            background-color: var(--verde-oliva-escuro);
            color: white;
            border-color: var(--verde-oliva-escuro);
            box-shadow: 0 4px 10px rgba(74, 83, 53, 0.3);
        }

        .numero-botao:disabled {
            background-color: #e0e0e0;
            color: #a0a0a0;
            border-color: #d0 d0 d0;
            cursor: not-allowed;
            position: relative;
        }

        .numero-botao:disabled::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background-color: #a0a0a0;
            transform: rotate(-45deg);
        }

        .formulario {
            border-top: 1px dashed var(--verde-oliva-borda);
            padding-top: 30px;
        }

        .campo-grupo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--verde-oliva-escuro);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--verde-oliva-borda);
            border-radius: 8px;
            background-color: var(--creme-fundo);
            color: var(--texto-escuro);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--verde-oliva-escuro);
        }

        .btn-comprar {
            font-family: 'Montserrat', sans-serif;
            width: 100%;
            background-color: var(--verde-oliva-escuro);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(74, 83, 53, 0.15);
            transition: all 0.2s;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-comprar:hover:not(:disabled) {
            background-color: var(--verde-oliva-medio);
            transform: translateY(-2px);
        }

        .btn-comprar:disabled {
            background-color: #b5b5b5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .carregando-msg, .erro-mensagem {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px 0;
            font-weight: 600;
            color: var(--texto-claro);
        }

        .erro-mensagem {
            color: #a74a4a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="monograma">J & L</div>
    <div class="divisor-folhas">🍃 ———————— 🍃</div>
    
    <h1>Ação entre Amigos</h1>
    <div class="descricao">
        Escolha os seus números da sorte abaixo para concorrer ao nosso prêmio especial de casamento! Os números em cinza já foram reservados.
    </div>

    <div class="grid-numeros" id="gridNumeros">
        <div class="carregando-msg">Carregando números disponíveis...</div>
    </div>

    <div class="formulario">
        <div class="campo-grupo">
            <label for="idNome">Seu Nome Completo:</label>
            <input type="text" id="idNome" placeholder="Ex: Maria Silva">
        </div>
        
        <div class="campo-grupo">
            <label for="idWhats">Seu WhatsApp:</label>
            <input type="tel" id="idWhats" placeholder="Ex: (11) 99999-9999">
        </div>

        <button class="btn-comprar" id="btnComprar" onclick="enviarPedido()" disabled>Escolha um número para prosseguir</button>
    </div>
</div>

<script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPmVS6dppOmMDGPxxf0hI52Pf-r26HJb2uIps6zP52PCvW4GMedNPWmHrn5G_NHuIP7Q/exec";
    
    let numerosSelecionados = [];

    async function carregarNumeros() {
        try {
            const response = await fetch(APP_SCRIPT_URL);
            const data = await response.json();
            
            // Corrige a leitura da propriedade vinda unificada do Sheets
            const numerosOcupados = data.ocupados || []; 
            
            const grid = document.getElementById('gridNumeros');
            grid.innerHTML = ''; 

            for (let i = 1; i <= 60; i++) {
                const botao = document.createElement('button');
                botao.className = 'numero-botao';
                botao.innerText = i;

                if (numerosOcupados.includes(i)) {
                    botao.classList.add('ocupado');
                    botao.disabled = true;
                } else {
                    botao.onclick = () => alternarNumero(i, botao);
                }

                grid.appendChild(botao);
            }
        } catch (error) {
            console.error("Erro ao carregar os dados:", error);
            document.getElementById('gridNumeros').innerHTML = 
                `<div class="erro-mensagem">Erro ao carregar os números. Tente recarregar a página.</div>`;
        }
    }

    function alternarNumero(num, elemento) {
        const index = numerosSelecionados.indexOf(num);
        
        if (index > -1) {
            numerosSelecionados.splice(index, 1);
            elemento.classList.remove('selecionado');
        } else {
            numerosSelecionados.push(num);
            elemento.classList.add('selecionado');
        }

        atualizarBotaoEnvio();
    }

    function atualizarBotaoEnvio() {
        const btn = document.getElementById('btnComprar');
        if (numerosSelecionados.length === 0) {
            btn.disabled = true;
            btn.innerText = "Escolha um número para prosseguir";
        } else {
            btn.disabled = false;
            btn.innerText = `Reservar Número(s): ${numerosSelecionados.sort((a, b) => a - b).join(', ')}`;
        }
    }

    async function enviarPedido() {
        const nome = document.getElementById('idNome').value.trim();
        const whatsapp = document.getElementById('idWhats').value.trim();
        const btn = document.getElementById('btnComprar');

        if (!nome || !whatsapp) {
            alert("Por favor, preencha o seu nome e WhatsApp antes de continuar.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Registrando escolha no sistema...";

        try {
            const response = await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Evita bloqueio de segurança na injeção de dados
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: nome,
                    whatsapp: whatsapp,
                    numeros: numerosSelecionados
                })
            });

            alert(`🎉 Reserva enviada com sucesso!\n\nNúmero(s): ${numerosSelecionados.join(', ')}\nNome: ${nome}\n\nObrigado por apoiar nosso casamento!`);
            
            // Reseta a interface local pós-envio
            numerosSelecionados = [];
            document.getElementById('idNome').value = '';
            document.getElementById('idWhats').value = '';
            atualizarBotaoEnvio();
            carregarNumeros();

        } catch (error) {
            alert("Houve um problema de rede ao salvar. Verifique sua conexão.");
            console.error(error);
            btn.disabled = false;
            atualizarBotaoEnvio();
        }
    }

    // Inicializa a grade ao abrir o site
    carregarNumeros();
</script>

</body>
</html>
